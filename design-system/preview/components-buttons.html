<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 20px; }
.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.row + .row { margin-top: 14px; }
.label { font-size: 10px; color: #475569; font-family: monospace; min-width: 80px; }
button {
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 8px; font-family: "Inter", sans-serif; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
}
.btn-primary { background: #3B82F6; color: #fff; font-size: 14px; padding: 8px 16px; }
.btn-primary:hover { background: #2563EB; box-shadow: 0 0 18px rgba(59,130,246,0.45); }
.btn-primary:active { transform: scale(0.97); }
.btn-primary-sm { background: #3B82F6; color: #fff; font-size: 12px; padding: 6px 12px; }
.btn-ghost { background: transparent; color: #F0F4FF; font-size: 14px; padding: 8px 16px; border: 1px solid rgba(59,130,246,0.3); }
.btn-ghost:hover { background: rgba(59,130,246,0.08); }
.btn-ghost-sm { background: transparent; color: #F0F4FF; font-size: 12px; padding: 6px 12px; border: 1px solid rgba(59,130,246,0.3); }
.btn-danger { background: transparent; color: #FCA5A5; font-size: 14px; padding: 8px 16px; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-disabled { background: #3B82F6; color: #fff; font-size: 14px; padding: 8px 16px; opacity: 0.5; cursor: not-allowed; }
svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style></head><body>
  <div class="row">
    <div class="label">primary</div>
    <button class="btn-primary">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New Scenario
    </button>
    <button class="btn-primary-sm">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Start
    </button>
  </div>
  <div class="row">
    <div class="label">ghost</div>
    <button class="btn-ghost">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
    <button class="btn-ghost-sm">
      <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Export
    </button>
  </div>
  <div class="row">
    <div class="label">danger</div>
    <button class="btn-danger">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      Delete
    </button>
    <button class="btn-disabled" disabled>Disabled</button>
  </div>
</body></html>
