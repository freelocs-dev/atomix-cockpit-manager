<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px 20px; }
.section { margin-bottom: 16px; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #64748B; margin-bottom: 8px; }
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 5px; border-radius: 9999px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
.pill-blue { background: rgba(59,130,246,0.1); color: #60A5FA; }
.pill-green { background: rgba(16,185,129,0.1); color: #34D399; }
.pill-gray { background: rgba(255,255,255,0.05); color: #64748B; }
.pill-red { background: rgba(220,38,38,0.1); color: #F87171; }
.pill-amber { background: rgba(245,158,11,0.1); color: #FCD34D; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-blue { background: #3B82F6; box-shadow: 0 0 6px rgba(59,130,246,0.8); }
.dot-green { background: #10B981; box-shadow: 0 0 6px rgba(16,185,129,0.8); }
.dot-gray { background: #475569; }
.dot-red { background: #DC2626; box-shadow: 0 0 6px rgba(220,38,38,0.8); }
.dots-row { display: flex; align-items: center; gap: 12px; }
.dot-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94A3B8; }
.kdot { width: 8px; height: 8px; border-radius: 50%; }
</style></head><body>
  <div class="section">
    <div class="section-title">Pills / Badges</div>
    <div class="row">
      <div class="pill pill-blue"><div class="dot dot-blue"></div>Running</div>
      <div class="pill pill-gray"><div class="dot dot-gray"></div>Stopped</div>
      <div class="pill pill-green">3 apps</div>
      <div class="pill pill-blue">KDE Breeze Dark</div>
      <div class="pill pill-red">Gaming</div>
      <div class="pill pill-amber">Creator</div>
      <div class="pill pill-gray">v0.2 beta</div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Status Dots</div>
    <div class="dots-row">
      <div class="dot-item"><div class="kdot" style="background:#3B82F6;box-shadow:0 0 8px #3B82F6"></div>Active</div>
      <div class="dot-item"><div class="kdot" style="background:#10B981;box-shadow:0 0 8px rgba(16,185,129,0.8)"></div>Running</div>
      <div class="dot-item"><div class="kdot" style="background:#475569"></div>Stopped</div>
      <div class="dot-item"><div class="kdot" style="background:#DC2626;box-shadow:0 0 8px rgba(220,38,38,0.7)"></div>Gaming</div>
      <div class="dot-item"><div class="kdot" style="background:#F59E0B;box-shadow:0 0 8px rgba(245,158,11,0.7)"></div>Creator</div>
    </div>
  </div>
  <div class="section" style="margin-bottom:0">
    <div class="section-title">Section Labels</div>
    <div style="display:flex;gap:24px">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#64748B">APP LIBRARY</div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#64748B">THEME CONFIG</div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#64748B">WALLPAPER</div>
    </div>
  </div>
</body></html>
