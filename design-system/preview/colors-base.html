<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
.swatch { border-radius: 8px; height: 64px; border: 1px solid rgba(255,255,255,0.06); }
.label { font-size: 10px; color: #64748B; margin-top: 5px; font-family: "JetBrains Mono", monospace; }
.name { font-size: 10px; color: #94A3B8; margin-bottom: 2px; }
</style></head><body>
<div class="grid">
  <div><div class="swatch" style="background:#05080F; border-color:rgba(99,179,237,0.15)"></div><div class="name">bg</div><div class="label">#05080F</div></div>
  <div><div class="swatch" style="background:#0A0F1E"></div><div class="name">surface</div><div class="label">#0A0F1E</div></div>
  <div><div class="swatch" style="background:#0D1526"></div><div class="name">card</div><div class="label">#0D1526</div></div>
  <div><div class="swatch" style="background:#111D35"></div><div class="name">elevated</div><div class="label">#111D35</div></div>
  <div><div class="swatch" style="background:#08101F"></div><div class="name">sidebar</div><div class="label">#08101F</div></div>
  <div><div class="swatch" style="background:#060D1A"></div><div class="name">input</div><div class="label">#060D1A</div></div>
  <div><div class="swatch" style="background:#04070D; border-color:rgba(99,179,237,0.15)"></div><div class="name">code</div><div class="label">#04070D</div></div>
  <div><div class="swatch" style="background:#1E2D45"></div><div class="name">toggle-off</div><div class="label">#1E2D45</div></div>
</div>
</body></html>
