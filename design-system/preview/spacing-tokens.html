<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; align-items: start; }
.token-card { background: #0D1526; border: 1px solid rgba(99,179,237,0.08); border-radius: 10px; padding: 10px; }
.demo { display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.name { font-size: 10px; color: #94A3B8; margin-bottom: 2px; }
.value { font-size: 10px; color: #475569; font-family: monospace; }
</style></head><body>
<div class="grid">
  <div class="token-card"><div class="demo"><div style="width:28px;height:28px;background:#0D1526;border:1px solid rgba(99,179,237,0.08);border-radius:4px"></div></div><div class="name">radius-sm</div><div class="value">6px</div></div>
  <div class="token-card"><div class="demo"><div style="width:28px;height:28px;background:#0D1526;border:1px solid rgba(99,179,237,0.08);border-radius:8px"></div></div><div class="name">radius-md</div><div class="value">8px (btn/input)</div></div>
  <div class="token-card"><div class="demo"><div style="width:28px;height:28px;background:#0D1526;border:1px solid rgba(99,179,237,0.08);border-radius:12px"></div></div><div class="name">radius-lg</div><div class="value">12px (cards)</div></div>
  <div class="token-card"><div class="demo"><div style="width:28px;height:28px;background:#0D1526;border:1px solid rgba(99,179,237,0.08);border-radius:16px"></div></div><div class="name">radius-xl</div><div class="value">16px (frames)</div></div>
  <div class="token-card"><div class="demo"><div style="width:28px;height:28px;background:#0D1526;border:1px solid rgba(99,179,237,0.08);border-radius:9999px"></div></div><div class="name">radius-full</div><div class="value">9999px (pills)</div></div>
  <div class="token-card"><div class="demo"><div style="width:28px;height:1px;background:rgba(255,255,255,0.05)"></div></div><div class="name">divider</div><div class="value">white/5%</div></div>
  <div class="token-card"><div class="demo"><div style="width:28px;height:28px;background:#0D1526;border:1px solid rgba(59,130,246,0.3);border-radius:8px"></div></div><div class="name">border-strong</div><div class="value">blue/30%</div></div>
</div>
</body></html>
