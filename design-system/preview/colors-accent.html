<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch { border-radius: 8px; height: 64px; border: 1px solid rgba(255,255,255,0.06); }
.label { font-size: 10px; color: #64748B; margin-top: 5px; font-family: "JetBrains Mono", monospace; }
.name { font-size: 10px; color: #94A3B8; margin-bottom: 2px; }
</style></head><body>
<div class="grid">
  <div><div class="swatch" style="background:#3B82F6; box-shadow: 0 0 18px rgba(59,130,246,0.5)"></div><div class="name">accent</div><div class="label">#3B82F6</div></div>
  <div><div class="swatch" style="background:#2563EB"></div><div class="name">accent-hover</div><div class="label">#2563EB</div></div>
  <div><div class="swatch" style="background:#60A5FA"></div><div class="name">accent-soft</div><div class="label">#60A5FA</div></div>
  <div><div class="swatch" style="background:rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3)"></div><div class="name">glow</div><div class="label">rgba(59,130,246,0.15)</div></div>
  <div><div class="swatch" style="background:rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2)"></div><div class="name">glow-soft</div><div class="label">rgba(59,130,246,0.08)</div></div>
  <div><div class="swatch" style="background:rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3)"></div><div class="name">nav-active-bg</div><div class="label">rgba(59,130,246,0.10)</div></div>
</div>
</body></html>
