<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.card { background: #0D1526; border: 1px solid rgba(99,179,237,0.08); border-radius: 10px; padding: 14px; }
.demo { height: 44px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.demo-box { width: 60px; height: 28px; background: #111D35; border-radius: 8px; }
.name { font-size: 10px; color: #94A3B8; }
.desc { font-size: 10px; color: #475569; margin-top: 2px; font-family: monospace; }
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="demo"><div class="demo-box" style="box-shadow: 0 0 20px rgba(59,130,246,0.08)"></div></div>
    <div class="name">card-hover</div>
    <div class="desc">0 0 20px rgba(59,130,246,0.08)</div>
  </div>
  <div class="card">
    <div class="demo"><div class="demo-box" style="box-shadow: 0 0 18px rgba(59,130,246,0.45); background:#3B82F6"></div></div>
    <div class="name">btn-hover glow</div>
    <div class="desc">0 0 18px rgba(59,130,246,0.45)</div>
  </div>
  <div class="card">
    <div class="demo"><div class="demo-box" style="box-shadow: 0 0 0 3px rgba(59,130,246,0.15); border: 1px solid #3B82F6"></div></div>
    <div class="name">focus ring</div>
    <div class="desc">0 0 0 3px rgba(59,130,246,0.15)</div>
  </div>
  <div class="card">
    <div class="demo"><div class="demo-box" style="animation: pulse 2.4s ease-in-out infinite; border: 1px solid rgba(59,130,246,0.4)"></div></div>
    <div class="name">glow-pulse</div>
    <div class="desc">0→24px 2.4s ease-in-out ∞</div>
  </div>
</div>
<style>
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.3); }
  50% { box-shadow: 0 0 24px 2px rgba(59,130,246,0.4); }
}
</style>
</body></html>
