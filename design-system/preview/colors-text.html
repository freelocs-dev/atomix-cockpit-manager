<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
.meta { display: flex; flex-direction: column; gap: 1px; }
.token { font-size: 10px; color: #475569; font-family: monospace; }
.sample { font-size: 13px; font-weight: 500; }
</style></head><body>
  <div class="row"><div class="dot" style="background:#F0F4FF"></div><div class="meta"><div class="sample" style="color:#F0F4FF">Primary text — #F0F4FF</div><div class="token">--atomix-text</div></div></div>
  <div class="row"><div class="dot" style="background:#94A3B8"></div><div class="meta"><div class="sample" style="color:#94A3B8">Secondary text — #94A3B8</div><div class="token">--atomix-text-secondary</div></div></div>
  <div class="row"><div class="dot" style="background:#64748B"></div><div class="meta"><div class="sample" style="color:#64748B">Muted / subtext — #64748B</div><div class="token">--atomix-muted</div></div></div>
  <div class="row"><div class="dot" style="background:#475569"></div><div class="meta"><div class="sample" style="color:#475569">Subtle / micro — #475569</div><div class="token">--atomix-subtle</div></div></div>
</body></html>
