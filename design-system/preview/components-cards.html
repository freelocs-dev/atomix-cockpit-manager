<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
.card {
  background: #0D1526; border: 1px solid rgba(99,179,237,0.08);
  border-radius: 12px; padding: 20px; flex: 1; transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 0 20px rgba(59,130,246,0.08); }
.card-running { border-color: rgba(59,130,246,0.4); animation: pulse 2.4s ease-in-out infinite; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.card-title-row { display: flex; align-items: center; gap: 10px; }
.emoji { font-size: 22px; }
.title { font-size: 17px; font-weight: 700; color: #fff; }
.pill { display: inline-flex; align-items: center; gap: 5px; border-radius: 9999px; padding: 2px 10px; font-size: 11px; font-weight: 500; }
.pill-blue { background: rgba(59,130,246,0.1); color: #60A5FA; }
.pill-green { background: rgba(16,185,129,0.1); color: #34D399; }
.pill-gray { background: rgba(255,255,255,0.05); color: #64748B; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: #10B981; box-shadow: 0 0 6px rgba(16,185,129,0.8); }
.dot-gray { background: #475569; }
.desc { font-size: 13px; color: #94A3B8; margin-bottom: 12px; line-height: 1.45; }
.pills-row { display: flex; gap: 6px; margin-bottom: 12px; }
.divider { height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 12px; }
.card-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
button { display: inline-flex; align-items: center; gap: 5px; border-radius: 8px; font-family: "Inter", sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; font-size: 12px; padding: 5px 12px; }
.btn-p { background: #3B82F6; color: #fff; }
.btn-p:hover { background: #2563EB; }
.btn-g { background: transparent; color: #F0F4FF; border: 1px solid rgba(59,130,246,0.3); }
.btn-g:hover { background: rgba(59,130,246,0.08); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.3); } 50% { box-shadow: 0 0 24px 2px rgba(59,130,246,0.4); } }
svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
</style></head><body>
  <div class="card">
    <div class="card-header">
      <div class="card-title-row"><span class="emoji">⚡</span><span class="title">Gaming Night</span></div>
      <div class="pill pill-gray"><div class="dot dot-gray"></div>Stopped</div>
    </div>
    <div class="desc">Full-screen gaming mode with performance tweaks and minimal distractions.</div>
    <div class="pills-row"><div class="pill pill-blue">4 apps</div><div class="pill pill-blue">KDE Breeze Dark</div></div>
    <div class="divider"></div>
    <div class="card-footer">
      <button class="btn-g"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Edit</button>
      <button class="btn-p"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Start</button>
    </div>
  </div>
  <div class="card card-running">
    <div class="card-header">
      <div class="card-title-row"><span class="emoji">💼</span><span class="title">Deep Work</span></div>
      <div class="pill pill-green"><div class="dot dot-green"></div>Running</div>
    </div>
    <div class="desc">Focus mode — minimal notifications, terminal, editor, browser.</div>
    <div class="pills-row"><div class="pill pill-blue">3 apps</div><div class="pill pill-blue">Atomix Blue</div></div>
    <div class="divider"></div>
    <div class="card-footer">
      <button class="btn-g">Edit</button>
      <button class="btn-p"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>Stop</button>
    </div>
  </div>
</body></html>
