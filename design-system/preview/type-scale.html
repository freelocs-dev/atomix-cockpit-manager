<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05080F; font-family: "Inter", sans-serif; padding: 16px 20px; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.row:last-child { border-bottom: none; }
.meta { font-size: 10px; color: #475569; font-family: "JetBrains Mono", monospace; min-width: 160px; flex-shrink: 0; }
</style></head><body>
  <div class="row">
    <div class="meta">30px / bold / -0.025em</div>
    <div style="font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.025em;line-height:1.2">Page Heading</div>
  </div>
  <div class="row">
    <div class="meta">20px / semibold</div>
    <div style="font-size:20px;font-weight:600;color:#F0F4FF">Section Heading</div>
  </div>
  <div class="row">
    <div class="meta">18px / bold</div>
    <div style="font-size:18px;font-weight:700;color:#fff">Card Title</div>
  </div>
  <div class="row">
    <div class="meta">14px / regular</div>
    <div style="font-size:14px;font-weight:400;color:#94A3B8">Body text — secondary. Automate apps, themes, and layout.</div>
  </div>
  <div class="row">
    <div class="meta">12px / regular</div>
    <div style="font-size:12px;font-weight:400;color:#64748B">Small / meta text — 3 apps · KDE Breeze</div>
  </div>
  <div class="row">
    <div class="meta">11px / 600 / uppercase</div>
    <div style="font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:0.1em">SECTION LABEL</div>
  </div>
  <div class="row">
    <div class="meta">10px / uppercase</div>
    <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:0.1em">v0.2 beta</div>
  </div>
</body></html>
